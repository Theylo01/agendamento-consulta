version: '3.9'

services:

  # Serviço da API AdonisJS
  api:
    # Informa ao Docker que a imagem será construída a partir de um Dockerfile.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agendamento_api
    ports:
      - "3333:3333"
    # Define variáveis disponíveis dentro do container.
    environment:
      TZ: ${TZ}
      PORT: ${PORT}
      HOST: ${HOST}
      LOG_LEVEL: ${LOG_LEVEL}
      NODE_ENV: ${NODE_ENV}
      SESSION_DRIVER: ${SESSION_DRIVER}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy   # Só sobe após o banco estar pronto
    restart: unless-stopped

  # Serviço do banco PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: agendamento_postgres
    # Define variáveis disponíveis dentro do container.
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Dados persistem mesmo derrubando o container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# Volume nomeado para persistência dos dados
volumes:
  postgres_data:
    driver: local